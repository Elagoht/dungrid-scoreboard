<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
form {
  background: #1a1a1a;
  padding: 2rem;
  border-radius: 8px;
  width: 100%;
  max-width: 360px;
}
h1 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; color: #fff; }
label { display: block; font-size: 0.875rem; margin-bottom: 0.5rem; color: #aaa; }
input[type="password"] {
  width: 100%;
  padding: 0.625rem 0.75rem;
  border: 1px solid #333;
  border-radius: 4px;
  background: #0f0f0f;
  color: #e0e0e0;
  font-size: 1rem;
  margin-bottom: 1rem;
}
input[type="password"]:focus { outline: none; border-color: #4f8cff; }
button {
  width: 100%;
  padding: 0.625rem;
  background: #4f8cff;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 1rem;
  cursor: pointer;
}
button:hover { background: #3d73e0; }
.error {
  background: #3a1a1a;
  color: #ff6b6b;
  padding: 0.5rem 0.75rem;
  border-radius: 4px;
  margin-bottom: 1rem;
  font-size: 0.875rem;
}
</style>
</head>
<body>
<form method="POST" action="/panel/login">
  <h1>Admin Panel</h1>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <label for="password">Password</label>
  <input type="password" id="password" name="password" required autofocus>
  <button type="submit">Login</button>
</form>
</body>
</html>
