<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{.Title}} — Top player rankings">
<title>{{.Title}}</title>
{{if .HasFavicon}}<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">{{end}}
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --text: #e4e4ec;
    --text-dim: #8888a0;
    --accent: #7c5cfc;
    --accent-glow: #7c5cfc44;
    --gold: #f0b90b;
    --silver: #b0b8c8;
    --bronze: #c8944a;
    --danger: #e04050;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 64px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header img {
    max-height: 64px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tabs button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .tabs button:hover { border-color: var(--accent); color: var(--text); }
  .tabs button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .search {
    margin-bottom: 24px;
    display: flex;
    gap: 8px;
  }
  .search input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    width: 240px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search button {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    transition: opacity 0.15s;
  }
  .search button:hover { opacity: 0.85; }
  table {
    width: 100%;
    max-width: 700px;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 16px;
    text-align: left;
    font-size: 0.875rem;
  }
  th {
    background: #14141c;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    position: sticky;
    top: 0;
  }
  td { border-top: 1px solid var(--border); }
  tr:hover td { background: #ffffff06; }
  .rank-num {
    font-weight: 700;
    font-size: 1rem;
    width: 56px;
  }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .score-cell { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .name-cell { font-weight: 600; }
  .details-cell { color: var(--text-dim); font-size: 0.8rem; }
  .rank-result {
    margin-bottom: 24px;
    padding: 16px 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    text-align: center;
    max-width: 700px;
    width: 100%;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .rank-result .player { font-size: 1.2rem; font-weight: 700; }
  .rank-result .rank { font-size: 2rem; font-weight: 800; color: var(--accent); }
  .rank-result .score { color: var(--text-dim); font-size: 0.9rem; }
  .loading { color: var(--text-dim); text-align: center; padding: 32px; }
  .error { color: var(--danger); text-align: center; padding: 32px; }
  .empty { color: var(--text-dim); text-align: center; padding: 32px; font-style: italic; }
  footer {
    margin-top: 48px;
    color: var(--text-dim);
    font-size: 0.75rem;
    opacity: 0.5;
  }
</style>
</head>
<body>
<header>
  {{if .HasLogo}}<img src="/assets/logo.png" alt="logo">{{end}}
  <h1>{{.Title}}</h1>
</header>

<div class="tabs">
  <button data-n="10" class="active">Top 10</button>
  <button data-n="50">Top 50</button>
  <button data-n="100">Top 100</button>
</div>

<div class="search">
  <input type="text" id="nameInput" placeholder="Search player name..." autocomplete="off">
  <button id="searchBtn">Find Rank</button>
</div>

<div id="rankResult"></div>
<div id="leaderboard"></div>

<footer>{{.Title}} &mdash; Powered by Generic Game Scoreboard Backend</footer>

<script>
const API_TOP = '/api/scores/top';
const API_RANK = '/api/scores/rank';

let activeN = 10;

// --- Tabs ---
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeN = parseInt(btn.dataset.n);
    document.getElementById('rankResult').innerHTML = '';
    loadTop(activeN);
  });
});

// --- Search ---
document.getElementById('searchBtn').addEventListener('click', searchRank);
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchRank();
});

// --- Load ---
loadTop(10);

async function loadTop(n) {
  const el = document.getElementById('leaderboard');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch(`${API_TOP}?n=${n}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty">No scores yet. Be the first!</div>';
      return;
    }
    renderTable(data, el);
  } catch (err) {
    el.innerHTML = `<div class="error">Failed to load: ${err.message}</div>`;
  }
}

async function searchRank() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  const el = document.getElementById('rankResult');
  el.innerHTML = '<div class="loading">Searching...</div>';
  try {
    const res = await fetch(`${API_RANK}?name=${encodeURIComponent(name)}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    if (!data || data.rank === 0) {
      el.innerHTML = `<div class="rank-result"><div class="player">"${escapeHtml(name)}"</div><div class="score">No scores found</div></div>`;
      return;
    }
    el.innerHTML = `<div class="rank-result">
      <div class="player">${escapeHtml(data.name)}</div>
      <div class="rank">#${data.rank}</div>
      <div class="score">Best Score: ${data.score.toLocaleString()}</div>
    </div>`;
  } catch (err) {
    el.innerHTML = `<div class="error">Search failed: ${err.message}</div>`;
  }
}

function renderTable(data, el) {
  let html = '<table><thead><tr>';
  html += '<th>#</th><th>Player</th><th>Score</th><th>Details</th>';
  html += '</tr></thead><tbody>';
  data.forEach((entry, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
    html += '<tr>';
    html += `<td class="rank-num ${rankClass}">${rank}</td>`;
    html += `<td class="name-cell">${escapeHtml(entry.name)}</td>`;
    html += `<td class="score-cell">${entry.score.toLocaleString()}</td>`;
    html += `<td class="details-cell">Floor ${entry.floor} &middot; ${entry.damage_dealt.toLocaleString()} dmg dealt &middot; ${entry.damage_taken.toLocaleString()} taken &middot; ${entry.revives} revives &middot; ${entry.quests} quests</td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
