name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o scoreboard-linux-amd64 .

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o scoreboard-linux-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scoreboard-linux-amd64
            scoreboard-linux-arm64
          generate_release_notes: true
